# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (4 levels):
#   0. Local parser → per-company `parser:` script for SSR/static career pages (zero-token)
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. HTTP JSON (WebFetch) → per-company `api:` on tracked_companies (see board_api_catalog below)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#   Prefer the BRANDED company careers URL whenever available; use ATS-hosted URL only as fallback.
#   ✅ https://careers.mastercard.com   ⚠️ https://mastercard.wd1.myworkdayjobs.com (fallback only)
#   ✅ https://openai.com/careers       ⚠️ https://job-boards.greenhouse.io/openai (fallback only)
#   Exception: ATS-hosted careers_url is acceptable when no branded careers page exists.
#   Using raw ATS URLs when a branded page exists can cause false 410 errors (job ID mismatch).
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Location filter (optional) --
# Filter scanned jobs by location. Applied AFTER title filter, BEFORE dedup.
# If this entire block is absent, all locations pass (current default behavior).

location_filter:
    # Priority order: Global remote → LATAM remote → Brazil remote
    # always_allow = strong remote signals that rescue multi-location posts from block list
    always_allow:
        - "Global"
        - "Worldwide"
        - "Any location"
        - "Anywhere"
        - "LATAM"
        - "Latin America"
    allow:
        - "Remote"
        - "USA"
        - "United States"
        - "Canada"
        - "South America"
        - "Brazil"
        - "Brasil"
    block:
        - "India"
        - "Bengaluru"
        - "United Kingdom"
        - "London"
        - "Singapore"
        - "Japan"
        - "Australia"
        - "São Paulo"
        - "Rio de Janeiro"
        - "Brasília"
        - "São Paulo, Brazil"

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
    positive:
        # [CUSTOMIZE] Add keywords matching YOUR target roles
        # -- Primary Roles --
        - "Senior Product Engineer"
        - "Senior Frontend Engineer"
        - "Senior Front-end Engineer"
        - "Senior Front End Engineer"
        - "Senior Software Engineer"
        - "Senior Fullstack Engineer"
        - "Senior Full Stack Engineer"
        - "Lead Software Engineer"
        - "Lead Frontend Engineer"
        - "Lead Product Engineer"
        - "Engineering Lead"
        # -- Acceptable Roles --
        - "Product Engineer"
        - "Frontend Engineer"
        - "Front-end Engineer"
        - "Front End Engineer"
        - "Software Engineer"
        - "Fullstack Engineer"
        - "Full Stack Engineer"
        - "Design Engineer"
        - "Engineer"
        # -- Tech Stack Signals --
        - "React"
        - "Next.js"
        - "TypeScript"
        - "Frontend"
        - "Front-end"
        - "Front End"
        - "Web"
        # -- Seniority (boost but not required) --
        - "Senior"
        - "Lead"
    negative:
        # [CUSTOMIZE] Add keywords for roles you want to exclude
        - "Developer Experience"
        - "DevEx"
        - "DX Engineer"
        - "Developer Relations"
        - "DevRel"
        - "Developer Advocate"
        - "Accessibility Engineer"
        - "a11y Engineer"
        - "WCAG Engineer"
        - "QA Engineer"
        - "Test Engineer"
        - "Quality Engineer"
        - ".NET"
        - "Java "
        - "iOS"
        - "Android"
        - "PHP"
        - "Ruby"
        - "Embedded"
        - "Firmware"
        - "FPGA"
        - "ASIC"
        - "Blockchain"
        - "Web3"
        - "Crypto"
        - "Solidity"
        - "Smart Contract"
        - "DevOps"
        - "SRE"
        - "Site Reliability"
        - "Data Science"
        - "Machine Learning"
        - "ML Engineer"
        - "AI Engineer"
        - "Sales"
        - "Sales Engineer"
        - "Solutions Engineer"
        - "Marketing"
        - "Recruiter"
    seniority_boost:
        # These prefixes add relevance but are not required
        - "Senior"
        - "Lead"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
    # -- Ashby --

    - name: Ashby - Senior Product/Frontend
      query: 'site:jobs.ashbyhq.com "Senior Product Engineer" OR "Senior Frontend Engineer" OR "Senior Software Engineer" remote'
      enabled: true

    - name: Ashby - Product Engineer
      query: 'site:jobs.ashbyhq.com "Product Engineer" remote'
      enabled: true

    - name: Ashby - Frontend Engineer
      query: 'site:jobs.ashbyhq.com "Frontend Engineer" OR "Front-end Engineer" remote'
      enabled: true

    - name: Ashby - Fullstack Engineer
      query: 'site:jobs.ashbyhq.com "Fullstack Engineer" OR "Full Stack Engineer" remote'
      enabled: true

    - name: Ashby - Design Engineer
      query: 'site:jobs.ashbyhq.com "Design Engineer" remote'
      enabled: true

    # -- Greenhouse --

    - name: Greenhouse - Senior Product/Frontend
      query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Senior Product Engineer" OR "Senior Frontend Engineer" OR "Senior Software Engineer" remote'
      enabled: true

    - name: Greenhouse - Product Engineer
      query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Product Engineer" remote'
      enabled: true

    - name: Greenhouse - Frontend Engineer
      query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Frontend Engineer" OR "Front-end Engineer" remote'
      enabled: true

    - name: Greenhouse - Software Engineer
      query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Software Engineer" remote'
      enabled: true

    - name: Greenhouse - React/Next.js
      query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "React" OR "Next.js" OR "TypeScript" senior remote'
      enabled: true

    # -- Workable --

    - name: Workable - Product/Frontend Roles
      query: 'site:apply.workable.com "Product Engineer" OR "Frontend Engineer" OR "Software Engineer" senior remote'
      enabled: true

    # -- Remote-friendly boards --

    - name: Remotive - Product/Frontend
      query: 'site:remotive.com "Product Engineer" OR "Frontend Engineer" OR "Software Engineer" Europe'
      enabled: true

    - name: WeWorkRemotely - Frontend
      query: 'site:weworkremotely.com "Frontend Engineer" OR "Software Engineer" OR "React"'
      enabled: true

    - name: Working Nomads - Frontend
      query: 'site:workingnomads.com "Frontend Engineer" OR "Software Engineer" OR "React"'
      enabled: true

    - name: EU Remote Jobs - Frontend
      query: 'site:euremotejobs.com "Frontend Engineer" OR "Software Engineer" OR "React"'
      enabled: true

    - name: RemoteOK - Frontend
      query: 'site:remoteok.com "Frontend Engineer" OR "Software Engineer" OR "React"'
      enabled: true

    - name: Himalayas - Remote Frontend
      query: 'site:himalayas.app "Product Engineer" OR "Frontend Engineer" OR "Software Engineer" Europe'
