    query: site:news.ycombinator.com OR site:hnrss.org "Product Engineer" OR "Frontend Engineer" OR "Frontend" OR "Software Engineer" OR "Fullstack Engineer" OR "Full Stack Engineer" OR "Full-stack Engineer" remote
    enabled: true
  - name: HN Who's Hiring RSS (Direct Feed)
    query: site:hnrss.org/whoishiring/jobs "Product Engineer" OR "Frontend Engineer" OR "Frontend" OR "Software Engineer" OR "Fullstack Engineer" OR "Full Stack Engineer" OR "Full-stack Engineer"
    enabled: true
    notes: Dedicated RSS feed for all hiring threads. The q= param filters directly in the feed. Compare with general HN query to catch missed entries.
